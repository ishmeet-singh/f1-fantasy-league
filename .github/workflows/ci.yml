name: ci

on:
  pull_request:
  push:
    branches: [main, master]

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - name: Diagnose npm network
        run: npm run diagnose:network
      - name: Install dependencies
        run: npm install
      - name: Build
        run: npm run build
