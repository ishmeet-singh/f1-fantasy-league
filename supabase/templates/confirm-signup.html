<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="color-scheme" content="light" />
  <title>Confirm your email — F1 Fantasy League</title>
</head>
<body style="margin:0;padding:0;background:#F8F8F8;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;">
  <table role="presentation" width="100%" cellpadding="0" cellspacing="0" border="0" style="background:#F8F8F8;">
    <tr>
      <td align="center" style="padding:32px 16px;">
        <table role="presentation" width="100%" cellpadding="0" cellspacing="0" border="0" style="max-width:480px;">
          <tr>
            <td style="background:#1C1C25;border-radius:16px 16px 0 0;border-top:4px solid #D31411;padding:20px 24px;">
              <img src="{{ .SiteURL }}/f1-logo-white.png" alt="F1" width="80" height="20" style="display:block;height:20px;width:auto;max-width:80px;border:0;" />
              <p style="margin:6px 0 0;font-size:10px;font-weight:700;letter-spacing:0.08em;text-transform:uppercase;color:#FFFFFF;line-height:1;">
                Fantasy League
              </p>
            </td>
          </tr>
          <tr>
            <td style="background:#FFFFFF;padding:24px;border-left:1px solid #E5E5E5;border-right:1px solid #E5E5E5;">
              <h1 style="margin:0 0 12px;font-size:22px;font-weight:700;line-height:1.3;color:#1C1C25;">
                Confirm your email
              </h1>
              <p style="margin:0 0 16px;font-size:15px;line-height:1.5;color:#6B6B76;">
                Welcome to F1 Fantasy League. Confirm your email address to finish setting up your account.
              </p>
              <table role="presentation" cellpadding="0" cellspacing="0" border="0">
                <tr>
                  <td style="border-radius:12px;background:#D31411;">
                    <a href="{{ .ConfirmationURL }}"
                      style="display:inline-block;padding:14px 28px;font-size:15px;font-weight:600;color:#FFFFFF;text-decoration:none;border-radius:12px;">
                      Confirm email →
                    </a>
                  </td>
                </tr>
              </table>
            </td>
          </tr>
          <tr>
            <td style="background:#FFFFFF;border-radius:0 0 16px 16px;border:1px solid #E5E5E5;border-top:0;padding:0 24px 24px 24px;">
              <p style="margin:0;font-size:11px;line-height:1.5;color:#6B6B76;word-break:break-all;">
                <a href="{{ .ConfirmationURL }}" style="color:#D31411;text-decoration:underline;">{{ .ConfirmationURL }}</a>
              </p>
            </td>
          </tr>
          <tr>
            <td style="padding:20px 8px 0;text-align:center;font-size:12px;line-height:1.5;color:#6B6B76;">
              F1 Fantasy League · Private prediction league
            </td>
          </tr>
        </table>
      </td>
    </tr>
  </table>
</body>
</html>
